<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
.fade-up {
    opacity: 0;
    transform: translateY(-30px);
    animation: fadeUp 0.6s ease forwards;
}

@keyframes fadeUp {
    0% {
        opacity: 0;
        transform: translateY(-30px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Quicksand', sans-serif;
}

body {
    background: #000;
    color: #fff;

    display: flex;
    flex-direction: column;
    align-items: center;

    min-height: 100vh;
    padding-top: 20px;
    overflow: hidden;
    animation: fadeUp 0.6s ease forwards;
}

/* TOPO (AGORA É UM CARD COMPLETO) */
.topo {
    width: 90%;
    max-width: 500px;

    padding: 15px;
    border-radius: 15px;

    background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);

    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* linha superior */
.topo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.topo .voltar {
    font-size: 14px;
    color: #ccc;
}

/* TOOLBAR (agora interna, sem width 90%) */
.toolbar {
    height: 55px;

    display: flex;
    align-items: center;
    gap: 15px;

    padding: 0 10px;

    border-radius: 12px;

    background: linear-gradient(145deg, #1f1f1f, #141414);
}

/* botões */
.tool {
    width: 35px;
    height: 35px;
    border-radius: 50%;

    background: linear-gradient(145deg, #3a3a3a, #1f1f1f);

    display: flex;
    align-items: center;
    justify-content: center;

    box-shadow: 0 2px 8px rgba(0,0,0,0.5);

    transition: 0.2s;
}

.tool:active {
    transform: scale(0.9);
}

h1 {
    margin-top: 5%;
    color: #777;

    width: 90%;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
}
</style>
</head>

<body>

<div class="topo fade-up">

    <div class="topo-header">
        <div>⬅</div>
        <div class="voltar" onclick="window.location.href='index.html'">Clique em mim para voltar!</div>
        <div>⋮</div>
    </div>

    <div class="toolbar">
        <div class="tool">⌨️</div>
        <div class="tool">✏️</div>
        <div class="tool">🖍️</div>
        <div class="tool">🧽</div>
    </div>

</div>

<h1>Nosso coração queima - fhop</h1>

</body>
</html>
